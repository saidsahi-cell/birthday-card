<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد سعيد</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 40%, #1a0a2e 100%);
    font-family: 'Amiri', serif;
    overflow: hidden;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  .card {
    position: relative;
    z-index: 10;
    width: min(520px, 94vw);
    background: linear-gradient(160deg, #fff8f0 0%, #fff0f5 50%, #f0f4ff 100%);
    border-radius: 28px;
    padding: 44px 36px 40px;
    box-shadow:
      0 0 0 2px #e8c4d8,
      0 0 40px rgba(255,150,200,0.3),
      0 24px 60px rgba(0,0,0,0.4);
    text-align: center;
    overflow: hidden;
  }

  .corner {
    position: absolute;
    font-size: 2.2rem;
    opacity: 0.85;
    animation: float 4s ease-in-out infinite;
  }
  .corner.tl { top: 10px; left: 12px; animation-delay: 0s; }
  .corner.tr { top: 10px; right: 12px; animation-delay: 0.5s; }
  .corner.bl { bottom: 10px; left: 12px; animation-delay: 1s; }
  .corner.br { bottom: 10px; right: 12px; animation-delay: 1.5s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-6px) rotate(5deg); }
  }

  .garland { position: absolute; top: 0; left: 0; right: 0; height: 32px; overflow: hidden; }
  .garland-inner {
    display: flex;
    justify-content: center;
    font-size: 1.5rem;
    line-height: 1;
    padding-top: 2px;
    animation: garlandSlide 8s linear infinite;
  }
  @keyframes garlandSlide {
    0%, 100% { letter-spacing: 2px; }
    50% { letter-spacing: 4px; }
  }

  .main-title {
    margin-top: 32px;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.2rem, 8vw, 3.2rem);
    font-weight: 700;
    background: linear-gradient(135deg, #c0392b, #e91e63, #9c27b0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
  }

  .sub-title {
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    color: #7b3f6e;
    font-weight: 700;
    margin-top: 4px;
  }

  .flowers {
    margin: 18px auto 0;
    font-size: 1.6rem;
    letter-spacing: 6px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }

  .cake-wrap {
    margin: 20px auto 0;
    font-size: 5.5rem;
    line-height: 1;
    filter: drop-shadow(0 8px 16px rgba(200,50,100,0.3));
    animation: cakeBounce 2.5s ease-in-out infinite;
  }
  @keyframes cakeBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-8px) scale(1.04); }
  }

  .message {
    margin-top: 20px;
    font-size: clamp(1rem, 3.5vw, 1.25rem);
    color: #4a2040;
    line-height: 1.9;
    font-style: italic;
    padding: 0 8px;
  }

  .divider {
    margin: 18px auto;
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #e8a0c0, transparent);
  }

  .balloons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
    font-size: 2rem;
  }
  .balloon {
    display: inline-block;
    animation: balloonFloat var(--d, 3s) ease-in-out infinite;
  }
  @keyframes balloonFloat {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-14px) rotate(3deg); }
  }

  .footer { margin-top: 20px; font-size: 0.9rem; color: #a06080; letter-spacing: 2px; }

  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
  .conf {
    position: absolute;
    top: -20px;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    opacity: 0.85;
    animation: fall var(--d, 4s) var(--delay, 0s) linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 1; }
    80% { opacity: 0.7; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(var(--drift, 30px)); opacity: 0; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="confetti-wrap" id="confetti"></div>

<div class="card">
  <div class="corner tl">🌹</div>
  <div class="corner tr">🌸</div>
  <div class="corner bl">🌸</div>
  <div class="corner br">🌹</div>

  <div class="garland">
    <div class="garland-inner">🎀🎊🎉🎀🎊🎉🎀🎊🎉🎀🎊🎉🎀🎊🎉🎀</div>
  </div>

  <div class="main-title">عيد ميلاد سعيد</div>
  <div class="sub-title"> امي الغالية مزهورة 🌺</div>

  <div class="flowers">🌷🌸🌼🌸🌷</div>

  <div class="cake-wrap" id="cake" onclick="toggleMusic()" style="cursor:pointer;">🎂</div>
  <div style="font-size:0.8rem;color:#b06090;margin-top:4px;">اضغط على الكعكة 🎵</div>

  <div class="divider"></div>

  <div class="message">
    أغلى أمٍّ في الوجود،<br>
    كلّ عام وأنتِ نور البيت وفرحته.<br>
    بارك الله في عمرك وأدام عليكِ الصحة والسعادة. 💖
  </div>

  <div class="divider"></div>

  <div class="balloons">
    <span class="balloon" style="--d:2.8s">🎈</span>
    <span class="balloon" style="--d:3.5s; animation-delay:.4s">🎁</span>
    <span class="balloon" style="--d:2.5s; animation-delay:.8s">🎈</span>
    <span class="balloon" style="--d:3.2s; animation-delay:.2s">✨</span>
    <span class="balloon" style="--d:2.9s; animation-delay:.6s">🎈</span>
  </div>

  <div class="footer">✦ بكلّ الحبّ ✦</div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${(Math.random()*3+2).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // Music
  let audioCtx = null;
  let playing = false;
  let stopFn = null;

  function toggleMusic() {
    const cake = document.getElementById('cake');
    if (playing) {
      if (stopFn) stopFn();
      playing = false;
      cake.style.filter = 'drop-shadow(0 8px 16px rgba(200,50,100,0.3))';
      return;
    }
    playing = true;
    cake.style.filter = 'drop-shadow(0 0 24px rgba(255,200,0,0.9)) drop-shadow(0 0 8px gold)';

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const notes = [
      [261.6,0.75],[261.6,0.25],[293.7,1],[261.6,1],[349.2,1],[329.6,2],
      [261.6,0.75],[261.6,0.25],[293.7,1],[261.6,1],[392,1],[349.2,2],
      [261.6,0.75],[261.6,0.25],[523.3,1],[440,1],[349.2,1],[329.6,1],[293.7,2],
      [466.2,0.75],[466.2,0.25],[440,1],[349.2,1],[392,1],[349.2,2]
    ];

    const bpm = 100;
    const beat = 60 / bpm;
    let t = audioCtx.currentTime + 0.1;
    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gainNode.connect(audioCtx.destination);
    const oscillators = [];

    notes.forEach(([freq, dur]) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.5, t + 0.05);
      g.gain.linearRampToValueAtTime(0, t + dur * beat - 0.05);
      osc.connect(g);
      g.connect(gainNode);
      osc.start(t);
      osc.stop(t + dur * beat);
      oscillators.push(osc);
      t += dur * beat;
    });

    const loopDuration = (t - audioCtx.currentTime) * 1000;
    let loopTimer = setTimeout(function() {
      if (!playing) return;
      toggleMusic(); toggleMusic();
    }, loopDuration);

    stopFn = () => {
      clearTimeout(loopTimer);
      oscillators.forEach(o => { try { o.stop(); } catch(e){} });
      gainNode.disconnect();
    };
  }

  // Confetti
  const confEl = document.getElementById('confetti');
  const colors = ['#e91e63','#9c27b0','#ff9800','#4caf50','#2196f3','#f44336','#ffeb3b'];
  for (let i = 0; i < 55; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    const drift = (Math.random() - 0.5) * 120;
    c.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --d:${(Math.random()*4+3).toFixed(1)}s;
      --delay:${(Math.random()*6).toFixed(1)}s;
      --drift:${drift}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    confEl.appendChild(c);
  }
</script>
</body>
</html>
