<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد سعيد يا أمي</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;
  overflow:hidden;
  width:100vw;height:100vh;
  font-family:'Amiri',serif;
}
canvas{position:fixed;inset:0;z-index:0;}

#startScreen{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.82);
  cursor:pointer;
  transition:opacity 0.8s;
}
#startScreen.hide{opacity:0;pointer-events:none;}
.start-glow{
  font-size:clamp(1.6rem,6vw,2.6rem);
  color:#fff;text-align:center;
  text-shadow:0 0 30px #ff69b4,0 0 60px #ff69b4;
  animation:pulse 1.6s ease-in-out infinite;
  padding:0 24px;line-height:1.7;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.97);}}

#cardScene{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  perspective:900px;
  opacity:0;transition:opacity 1s;pointer-events:none;
}
#cardScene.show{opacity:1;pointer-events:all;}

#card3d{
  width:min(420px,92vw);
  height:min(600px,88vh);
  position:relative;
  transform-style:preserve-3d;
  transform:rotateY(-30deg) rotateX(8deg);
  transition:transform 1.2s cubic-bezier(.25,.8,.25,1);
  cursor:grab;
}

.face{
  position:absolute;inset:0;
  border-radius:24px;
  backface-visibility:hidden;
  overflow:hidden;
}

#front{
  background:linear-gradient(145deg,#1a0033,#3d0066,#1a0033);
  border:2px solid rgba(255,100,200,.4);
  box-shadow:
    0 0 0 1px rgba(255,150,255,.15),
    inset 0 0 60px rgba(180,0,255,.15),
    0 30px 80px rgba(0,0,0,.8);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;
  transform:translateZ(0px);
}

#front::before{
  content:'';
  position:absolute;inset:-2px;
  border-radius:26px;
  background:linear-gradient(90deg,#ff69b4,#a855f7,#06b6d4,#ff69b4);
  background-size:300% 300%;
  z-index:-1;
  animation:borderGlow 4s linear infinite;
  filter:blur(3px);
}
@keyframes borderGlow{
  0%{background-position:0% 50%;}
  100%{background-position:300% 50%;}
}

.front-title{
  font-size:clamp(1.4rem,5vw,2rem);
  font-weight:700;
  text-align:center;
  background:linear-gradient(135deg,#ff69b4,#fff,#a855f7,#fff,#ff69b4);
  background-size:300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:textShimmer 4s linear infinite;
  padding:0 16px;
  line-height:1.5;
}
@keyframes textShimmer{0%{background-position:0%;}100%{background-position:300%;}}

.front-cake{
  font-size:clamp(5rem,18vw,8rem);
  filter:drop-shadow(0 0 20px #ff69b4) drop-shadow(0 0 40px #a855f7);
  animation:cakeFloat 3s ease-in-out infinite;
}
@keyframes cakeFloat{
  0%,100%{transform:translateY(0) rotateY(0deg);}
  50%{transform:translateY(-14px) rotateY(10deg);}
}

.front-sub{
  font-size:clamp(.95rem,3.5vw,1.3rem);
  color:#e8b4ff;
  text-align:center;
  padding:0 20px;
  line-height:1.6;
  text-shadow:0 0 10px #a855f7;
}

.tap-card-hint{
  font-size:clamp(.8rem,2.8vw,1rem);
  color:rgba(255,200,255,.7);
  animation:pulse 2s ease-in-out infinite;
  margin-top:8px;
}

.star3d{
  position:absolute;
  font-size:1.2rem;
  animation:star3dFloat var(--d,4s) var(--del,0s) ease-in-out infinite;
  filter:drop-shadow(0 0 6px gold);
}
@keyframes star3dFloat{
  0%,100%{transform:translateY(0) translateZ(0) rotate(0deg);}
  50%{transform:translateY(-20px) translateZ(30px) rotate(180deg);}
}

#back{
  background:linear-gradient(145deg,#0d001a,#1a0033,#0d001a);
  transform:rotateY(180deg) translateZ(0px);
  border:2px solid rgba(255,100,200,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:28px 20px 20px;
  gap:12px;
  overflow-y:auto;
}

.edge-right{
  position:absolute;
  top:0;right:-12px;
  width:12px;height:100%;
  background:linear-gradient(to right,#2d0050,#1a0033);
  transform:rotateY(90deg);
  transform-origin:left center;
  border-radius:0 8px 8px 0;
}
.edge-bottom{
  position:absolute;
  bottom:-12px;left:0;
  width:100%;height:12px;
  background:linear-gradient(to bottom,#2d0050,#1a0033);
  transform:rotateX(-90deg);
  transform-origin:top center;
  border-radius:0 0 8px 8px;
}

.back-title{
  font-size:clamp(1.1rem,4vw,1.5rem);
  font-weight:700;
  text-align:center;
  background:linear-gradient(135deg,#ff69b4,#fff,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.5;
}

.back-cake-wrap{
  position:relative;
  transform-style:preserve-3d;
  animation:backCake 4s ease-in-out infinite;
}
@keyframes backCake{
  0%,100%{transform:rotateY(0deg) translateY(0);}
  50%{transform:rotateY(20deg) translateY(-8px);}
}
.back-cake{font-size:clamp(3.5rem,12vw,5.5rem);filter:drop-shadow(0 0 16px #ff69b4);}
.candles-row{display:flex;gap:8px;justify-content:center;margin-top:-8px;}
.candle3d{display:flex;flex-direction:column;align-items:center;}
.flame3d{
  width:9px;height:14px;
  background:radial-gradient(ellipse at 50% 90%,#fff,#ffdd00,#ff8c00,transparent);
  border-radius:50% 50% 30% 30%;
  animation:flame3dFlicker .35s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 8px #ff8c00);
}
@keyframes flame3dFlicker{
  from{transform:scaleX(1)scaleY(1)rotate(-3deg);}
  to{transform:scaleX(.75)scaleY(1.25)rotate(3deg);}
}
.candle3d-body{
  width:7px;height:18px;
  border-radius:3px;
  background:linear-gradient(var(--c1,#ff69b4),var(--c2,#ff1493));
  box-shadow:inset -2px 0 4px rgba(0,0,0,.3);
}

.typed-wrap{
  min-height:70px;text-align:center;
  padding:0 8px;
}
.typed-text{
  font-size:clamp(1rem,3.8vw,1.35rem);
  color:#fff;
  line-height:1.8;
  text-shadow:0 0 10px #ff69b4,0 0 25px #ff69b4;
}
.cur{
  display:inline-block;width:2px;height:1.1em;
  background:#ff69b4;
  animation:curBlink .7s step-end infinite;
  vertical-align:text-bottom;
}
@keyframes curBlink{0%,100%{opacity:1;}50%{opacity:0;}}

.heart3d-wrap{
  transform-style:preserve-3d;
  animation:heartSpin 6s linear infinite;
}
@keyframes heartSpin{
  0%{transform:rotateY(0deg);}
  100%{transform:rotateY(360deg);}
}
.heart3d{font-size:clamp(2.5rem,9vw,4rem);filter:drop-shadow(0 0 20px #ff1493);}

#loveBtn{
  display:none;
  padding:13px 28px;
  background:linear-gradient(135deg,#ff1493,#a855f7,#ff1493);
  background-size:200%;
  color:#fff;
  font-family:'Amiri',serif;
  font-size:clamp(.95rem,3.5vw,1.25rem);
  font-weight:700;
  border:none;border-radius:50px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,20,147,.6),0 0 50px rgba(168,85,247,.3);
  animation:btnPulse 2s ease-in-out infinite,btnGrad 3s ease infinite;
  letter-spacing:1px;
  width:90%;
}
@keyframes btnPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
@keyframes btnGrad{0%{background-position:0%;}100%{background-position:200%;}}

#balloons{position:fixed;inset:0;z-index:5;pointer-events:none;}
.bal{
  position:absolute;
  bottom:-10%;
  font-size:clamp(2.2rem,7vw,3.8rem);
  animation:balRise var(--d,7s) var(--del,0s) ease-in forwards;
  filter:drop-shadow(0 0 8px rgba(255,255,255,.3));
}
@keyframes balRise{
  0%{transform:translateY(0)translateX(0)rotate(0);opacity:1;}
  100%{transform:translateY(-120vh)translateX(var(--dx,30px))rotate(var(--r,15deg));opacity:0;}
}

#petals{position:fixed;inset:0;z-index:6;pointer-events:none;}
.pet{
  position:absolute;top:-5%;
  animation:petFall var(--d,6s) var(--del,0s) linear infinite;
}
@keyframes petFall{
  0%{transform:translateY(0)rotate(0)translateX(0);opacity:1;}
  100%{transform:translateY(108vh)rotate(540deg)translateX(var(--dx,40px));opacity:0;}
}

#hearts{position:fixed;inset:0;z-index:7;pointer-events:none;display:flex;align-items:center;justify-content:center;}
.hfly{
  position:absolute;
  animation:hFly var(--d,1.8s) ease-out forwards;
  font-size:clamp(1.2rem,4vw,2.2rem);
}
@keyframes hFly{
  0%{transform:translate(0,0)scale(0);opacity:1;}
  70%{opacity:.9;}
  100%{transform:translate(var(--tx,0px),var(--ty,-200px))scale(1.4);opacity:0;}
}

#confetti{position:fixed;inset:0;z-index:8;pointer-events:none;}
.conf{
  position:absolute;top:-10px;
  animation:confFall var(--d,5s) var(--del,0s) linear infinite;
  border-radius:2px;
}
@keyframes confFall{
  0%{transform:translateY(0)rotate(0)translateX(0);opacity:1;}
  100%{transform:translateY(110vh)rotate(720deg)translateX(var(--dx,60px));opacity:0;}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="startScreen">
  <div class="start-glow">✨ اضغط لبدء المفاجأة ✨<br><span style="font-size:.7em;color:#d8b4fe">لأمي الغالية مزهورة</span></div>
</div>

<div id="cardScene">
  <div id="card3d" style="transform-style:preserve-3d;">
    <div class="edge-right"></div>
    <div class="edge-bottom"></div>

    <div class="face" id="front">
      <span class="star3d" style="top:8%;left:8%;--d:3.5s;--del:0s">⭐</span>
      <span class="star3d" style="top:12%;right:10%;--d:4s;--del:.5s">✨</span>
      <span class="star3d" style="bottom:15%;left:12%;--d:5s;--del:1s">💫</span>
      <span class="star3d" style="bottom:10%;right:8%;--d:3s;--del:.3s">⭐</span>
      <span class="star3d" style="top:50%;left:5%;--d:4.5s;--del:.8s">✨</span>
      <div class="front-title">🌹 عيد ميلاد سعيد<br>يا أمي الغالية مزهورة 🌹</div>
      <div class="front-cake">🎂</div>
      <div class="front-sub">🎀 اضغط على البطاقة لفتح المفاجأة 🎀</div>
      <div class="tap-card-hint">👆 انقر هنا</div>
    </div>

    <div class="face" id="back">
      <div class="back-title">🌸 عيد ميلاد سعيد<br>يا أمي الغالية مزهورة 🌸</div>
      <div class="back-cake-wrap">
        <div class="candles-row">
          <div class="candle3d"><div class="flame3d"></div><div class="candle3d-body" style="--c1:#ff69b4;--c2:#ff1493"></div></div>
          <div class="candle3d"><div class="flame3d" style="animation-delay:.12s"></div><div class="candle3d-body" style="--c1:#ffe066;--c2:#ffa500"></div></div>
          <div class="candle3d"><div class="flame3d" style="animation-delay:.24s"></div><div class="candle3d-body" style="--c1:#a78bfa;--c2:#7c3aed"></div></div>
        </div>
        <div class="back-cake">🎂</div>
      </div>
      <div class="typed-wrap">
        <div class="typed-text" id="typedEl"><span class="cur" id="cur"></span></div>
      </div>
      <div class="heart3d-wrap"><div class="heart3d">💖</div></div>
      <button id="loveBtn" onclick="celebrate()">❤️ أحبكِ يا أمي مزهورة ❤️</button>
    </div>
  </div>
</div>

<div id="balloons"></div>
<div id="petals"></div>
<div id="hearts"></div>
<div id="confetti"></div>

<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H;
const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;};
resize();addEventListener('resize',resize);

const STARS=Array.from({length:220},()=>({
  x:Math.random(),y:Math.random(),
  r:Math.random()*1.8+.3,
  a:Math.random(),da:(Math.random()-.5)*.007,
  hue:Math.random()<.3?`${Math.floor(Math.random()*60+280)}`:'0',
  sat:Math.random()<.3?'80%':'0%'
}));

const FW=[];
let fwOn=false;

function spawnFW(){
  const x=W*(.1+Math.random()*.8),y=H*(.08+Math.random()*.5);
  const hue=Math.random()*360;
  for(let i=0;i<70;i++){
    const a=Math.PI*2*i/70,sp=2+Math.random()*5;
    FW.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:1,dec:.013+Math.random()*.009,
      r:2+Math.random()*2.5,hue,grav:.07,trail:[]});
  }
}

const ORBS=Array.from({length:14},()=>({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  z:Math.random()*400+100,
  vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
  hue:Math.random()*60+280,r:2+Math.random()*4
}));

function draw(){
  cx.fillStyle='rgba(0,0,10,.17)';
  cx.fillRect(0,0,W,H);
  STARS.forEach(s=>{
    s.a+=s.da;
    if(s.a>1)s.da=-Math.abs(s.da);
    if(s.a<.05)s.da=Math.abs(s.da);
    cx.beginPath();
    cx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    cx.fillStyle=`hsla(${s.hue},${s.sat},100%,${s.a})`;
    cx.fill();
  });
  ORBS.forEach(o=>{
    o.x+=o.vx;o.y+=o.vy;
    if(o.x<0||o.x>W)o.vx*=-1;
    if(o.y<0||o.y>H)o.vy*=-1;
    const scale=400/(400+o.z),rx=o.r*scale*3;
    const grad=cx.createRadialGradient(o.x,o.y,0,o.x,o.y,rx*4);
    grad.addColorStop(0,`hsla(${o.hue},80%,70%,${.12*scale})`);
    grad.addColorStop(1,'transparent');
    cx.beginPath();cx.arc(o.x,o.y,rx*4,0,Math.PI*2);
    cx.fillStyle=grad;cx.fill();
  });
  for(let i=FW.length-1;i>=0;i--){
    const p=FW[i];
    p.trail.push({x:p.x,y:p.y,l:p.life});
    if(p.trail.length>5)p.trail.shift();
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.vx*=.97;p.vy*=.97;p.life-=p.dec;
    if(p.life<=0){FW.splice(i,1);continue;}
    p.trail.forEach(t=>{
      cx.beginPath();cx.arc(t.x,t.y,(p.r*t.l)*.6,0,Math.PI*2);
      cx.fillStyle=`hsla(${p.hue},90%,65%,${t.l*.4})`;cx.fill();
    });
    cx.beginPath();cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    cx.fillStyle=`hsla(${p.hue},90%,75%,${p.life})`;cx.fill();
  }
  requestAnimationFrame(draw);
}
draw();

let AC=null;
const initAC=()=>{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();};

function melody(){
  if(!AC)return;
  const notes=[
    [261.6,.75],[261.6,.25],[293.7,1],[261.6,1],[349.2,1],[329.6,2],
    [261.6,.75],[261.6,.25],[293.7,1],[261.6,1],[392,1],[349.2,2],
    [261.6,.75],[261.6,.25],[523.3,1],[440,1],[349.2,1],[329.6,1],[293.7,2],
    [466.2,.75],[466.2,.25],[440,1],[349.2,1],[392,1],[349.2,2]
  ];
  const bpm=108,beat=60/bpm;
  let t=AC.currentTime+.1;
  const master=AC.createGain();
  master.gain.setValueAtTime(.3,t);master.connect(AC.destination);
  const delay=AC.createDelay(.3),fb=AC.createGain();
  fb.gain.value=.25;delay.connect(fb);fb.connect(delay);delay.connect(master);
  notes.forEach(([f,d])=>{
    ['sine','triangle'].forEach((type,ti)=>{
      const osc=AC.createOscillator(),g=AC.createGain();
      osc.type=type;
      osc.frequency.setValueAtTime(ti===0?f:f*2,t);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(ti===0?.5:.12,t+.04);
      g.gain.linearRampToValueAtTime(0,t+d*beat-.04);
      osc.connect(g);g.connect(master);
      if(ti===0)g.connect(delay);
      osc.start(t);osc.stop(t+d*beat);
    });
    t+=d*beat;
  });
}

function sfx(f=440,d=.3,v=.4){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sine';o.frequency.setValueAtTime(f,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(f*.4,AC.currentTime+d);
  g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);
}

let cardOpen=false;
const card=document.getElementById('card3d');

document.addEventListener('mousemove',e=>{
  if(cardOpen)return;
  const mx=(e.clientX/W-.5)*18,my=(e.clientY/H-.5)*(-12);
  card.style.transform=`rotateY(${-30+mx}deg) rotateX(${8+my}deg)`;
});
document.addEventListener('touchmove',e=>{
  if(cardOpen)return;
  const t=e.touches[0];
  const mx=(t.clientX/W-.5)*18,my=(t.clientY/H-.5)*(-12);
  card.style.transform=`rotateY(${-30+mx}deg) rotateX(${8+my}deg)`;
},{passive:true});

function openCard(){
  if(cardOpen)return;
  cardOpen=true;
  sfx(880,.4,.5);
  card.style.transition='transform 1.4s cubic-bezier(.25,.8,.25,1)';
  card.style.transform='rotateY(180deg) rotateX(0deg)';
  launchBalloons();startPetals();
  setTimeout(()=>{melody();startTyping();},800);
}
card.addEventListener('click',openCard);
card.addEventListener('touchend',openCard);

document.getElementById('startScreen').addEventListener('click',()=>{
  initAC();sfx(523,.3,.4);
  document.getElementById('startScreen').classList.add('hide');
  document.getElementById('cardScene').classList.add('show');
  let c=0;
  const fi=setInterval(()=>{spawnFW();if(++c>=10)clearInterval(fi);},500);
});

function startTyping(){
  const msg='كلّ عام وأنتِ بخير\nيا أمي الغالية مزهورة 🌸\nأنتِ نور حياتي ❤️';
  const el=document.getElementById('typedEl'),cur=document.getElementById('cur');
  let i=0;
  const iv=setInterval(()=>{
    if(i>=msg.length){clearInterval(iv);cur.remove();
      setTimeout(()=>{document.getElementById('loveBtn').style.display='block';},600);
      return;
    }
    if(msg[i]==='\n')el.insertBefore(document.createElement('br'),cur);
    else el.insertBefore(document.createTextNode(msg[i]),cur);
    i++;
  },75);
}

function launchBalloons(){
  const bc=document.getElementById('balloons');bc.innerHTML='';
  const ems=['🎈','🎀','🎈','🎊','🎈','💜','🎈','🌸'];
  for(let i=0;i<16;i++){
    const b=document.createElement('div');b.className='bal';
    b.textContent=ems[i%ems.length];
    const d=4+Math.random()*5,del=Math.random()*5;
    const dx=(Math.random()-.5)*200,r=(Math.random()-.5)*40;
    b.style.cssText=`left:${3+Math.random()*94}%;font-size:${2+Math.random()*1.5}rem;--d:${d}s;--del:${del}s;--dx:${dx}px;--r:${r}deg;`;
    bc.appendChild(b);
  }
}

function startPetals(){
  const pc=document.getElementById('petals');pc.innerHTML='';
  const ems=['🌸','🌺','💗','🌹','💕','✨','🌸','💖','🌷'];
  for(let i=0;i<28;i++){
    const p=document.createElement('div');p.className='pet';
    p.textContent=ems[i%ems.length];
    const d=4+Math.random()*6,del=Math.random()*10;
    const dx=(Math.random()-.5)*180;
    p.style.cssText=`left:${Math.random()*100}%;font-size:${.9+Math.random()*1.4}rem;--d:${d}s;--del:${del}s;--dx:${dx}px;`;
    pc.appendChild(p);
  }
}

function burstHearts(){
  const hb=document.getElementById('hearts');hb.innerHTML='';
  const ems=['❤️','💕','💖','💗','💓','✨','🌸','💝'];
  for(let i=0;i<22;i++){
    const h=document.createElement('div');h.className='hfly';
    h.textContent=ems[i%ems.length];
    const ang=Math.random()*Math.PI*2,dist=100+Math.random()*220;
    const tx=Math.cos(ang)*dist,ty=-(Math.abs(Math.sin(ang)*dist)+60);
    const d=1+Math.random()*1.2,del=Math.random()*.6;
    h.style.cssText=`--tx:${tx}px;--ty:${ty}px;--d:${d}s;animation-delay:${del}s;`;
    hb.appendChild(h);
  }
  setTimeout(()=>hb.innerHTML='',3000);
}

function spawnConfetti(){
  const cf=document.getElementById('confetti');cf.innerHTML='';
  const colors=['#ff69b4','#a855f7','#ffe066','#34d399','#60a5fa','#f87171','#fff'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');c.className='conf';
    const dx=(Math.random()-.5)*300,d=3+Math.random()*4,del=Math.random()*5;
    c.style.cssText=`left:${Math.random()*100}%;width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;background:${colors[i%colors.length]};--d:${d}s;--del:${del}s;--dx:${dx}px;border-radius:${Math.random()>.5?'50%':'2px'};`;
    cf.appendChild(c);
  }
}

function celebrate(){
  sfx(880,.5,.5);burstHearts();spawnConfetti();launchBalloons();startPetals();melody();
  let c=0;const fi=setInterval(()=>{spawnFW();if(++c>=8)clearInterval(fi);},400);
}
</script>
